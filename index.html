<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Don't Feed the Fowler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --warm: #e8a948;
      --darkest: #0c0c0e;
      --text: #e0ddd5;
      --text-dim: #5a5855;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--darkest);
    }

    body {
      font-family: 'IBM Plex Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background door image ── */
    .door-bg {
      position: fixed;
      inset: 0;
      background-image: url('images/door-bg.png');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    /* Dark vignette overlay */
    .door-vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse 70% 100% at 50% 50%, transparent 20%, rgba(0,0,0,0.55) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 30%, rgba(0,0,0,0.2) 70%, rgba(0,0,0,0.75) 100%);
    }

    /* Grain overlay */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 2;
      opacity: 0.04;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* ── Main content ── */
    .landing-content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 32px 90px;
    }

    /* Top branding */
    .brand-top {
      text-align: center;
      animation: fadeIn 1.2s ease both;
    }
    .brand-warning {
      font-size: 9px;
      letter-spacing: 0.55em;
      color: rgba(232, 169, 72, 0.55);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .brand-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      letter-spacing: 0.22em;
      color: var(--text);
      line-height: 1;
      text-shadow: 0 2px 24px rgba(0,0,0,0.8);
    }
    .brand-title span {
      color: var(--warm);
    }

    /* Center spacer — takes up most of the door area */
    .door-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Sign / enter area */
    .enter-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: fadeInUp 1.4s ease 0.3s both;
    }

    .enter-label {
      font-size: 9px;
      letter-spacing: 0.45em;
      color: rgba(224, 221, 213, 0.45);
      text-transform: uppercase;
    }

    .enter-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 44px;
      margin-top: 60px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.35em;
      color: var(--darkest);
      background: var(--warm);
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }
    .enter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .enter-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(232,169,72,0.35);
    }
    .enter-btn:hover::before { opacity: 1; }
    .enter-btn:active { transform: translateY(0); }

    /* Arrow icon */
    .enter-arrow {
      font-size: 1.1rem;
      transition: transform 0.2s;
    }
    .enter-btn:hover .enter-arrow { transform: translateX(4px); }

    /* Top byline */
    .brand-top {
      text-align: center;
      animation: fadeIn 1.2s ease 0.6s both;
    }
    .byline {
      font-size: 9px;
      letter-spacing: 0.28em;
      color: rgba(90, 88, 85, 0.6);
    }
    .byline a {
      color: rgba(232, 169, 72, 0.45);
      text-decoration: none;
      transition: color 0.2s;
    }
    .byline a:hover { color: rgba(232, 169, 72, 0.8); }

    /* Page transition on enter */
    .page-transition {
      position: fixed;
      inset: 0;
      background: var(--darkest);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }
    .page-transition.fade-out {
      opacity: 1;
      pointer-events: all;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── App bar ── */
    .app-bar {
      position: fixed;
      bottom: 34px;
      right: 28px;
      z-index: 20;
      display: flex;
      gap: 20px;
      padding: 10px 14px;
      background: rgba(10, 10, 12, 0.85);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
    }
    .app-bar-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      text-decoration: none;
      color: inherit;
      opacity: 0.55;
      transition: opacity 0.2s, transform 0.2s;
    }
    .app-bar-item:hover { opacity: 0.9; transform: translateY(-2px); }
    .app-bar-item.soon { cursor: default; pointer-events: none; }
    .app-bar-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px; letter-spacing: 0.05em;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .app-bar-icon.cp  { background: linear-gradient(145deg, #1e2d1e, #0e1a0e); color: #5cad5c; }
    .app-bar-icon.br  { background: linear-gradient(145deg, #1a1e2d, #0e1118); color: #5c7cad; }
    .app-bar-icon.xml { background: linear-gradient(145deg, #2d1e1e, #1a0e0e); color: #ad5c5c; }
    .app-bar-icon.cl  { background: linear-gradient(145deg, #2a2218, #1a150e); color: #e8a948; }
    .app-bar-label {
      font-size: 7.5px; letter-spacing: 0.12em;
      color: rgba(224, 221, 213, 0.7);
      text-transform: uppercase;
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .landing-content { padding: 36px 24px; }
      .brand-title { font-size: 2rem; letter-spacing: 0.14em; }
      .enter-btn { padding: 12px 32px; font-size: 1.1rem; }
      .app-bar { gap: 14px; right: 16px; bottom: 20px; }
    }
  </style>
</head>
<body>

  <div class="door-bg"></div>
  <div class="door-vignette"></div>
  <div class="grain"></div>
  <div class="page-transition" id="pageTransition"></div>

  <div class="landing-content">

    <!-- Top byline -->
    <div class="brand-top">
      <p class="byline">
        ZACHARY FOWLER &nbsp;·&nbsp; FILM EDITOR &nbsp;·&nbsp;
        <a href="https://www.imdb.com/name/nm9598594/" target="_blank">IMDB ↗</a>
      </p>
    </div>

    <!-- Door center space + enter button -->
    <div class="door-center">
      <div class="enter-area">
        <a class="enter-btn" href="portfolio.html" id="enterBtn">
          ENTER
          <span class="enter-arrow">→</span>
        </a>
      </div>
    </div>

  </div>

  <!-- App bar -->
  <div class="app-bar">
    <a class="app-bar-item" href="https://app.comppilot.io" target="_blank">
      <div class="app-bar-icon cp">CP</div>
      <span class="app-bar-label">CompPilot</span>
    </a>
    <span class="app-bar-item soon">
      <div class="app-bar-icon br">BR</div>
      <span class="app-bar-label">Coming Soon</span>
    </span>
    <span class="app-bar-item soon">
      <div class="app-bar-icon xml">XML</div>
      <span class="app-bar-label">XML Conv.</span>
    </span>
    <span class="app-bar-item soon">
      <div class="app-bar-icon cl">CL</div>
      <span class="app-bar-label">Coming Soon</span>
    </span>
  </div>

  <script>
    document.getElementById('enterBtn').addEventListener('click', function(e) {
      e.preventDefault();
      var overlay = document.getElementById('pageTransition');
      overlay.classList.add('fade-out');
      setTimeout(function() {
        window.location.href = 'portfolio.html';
      }, 450);
    });
  </script>

</body>
</html>
